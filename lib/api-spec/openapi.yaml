openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DE-COT Pipeline Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pipeline
    description: Pipeline status and control
  - name: evaluation
    description: Evaluation metrics
  - name: inference
    description: Inference service
  - name: agent
    description: Reasoning agent
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pipeline/status:
    get:
      operationId: getPipelineStatus
      tags: [pipeline]
      responses:
        "200":
          description: Pipeline status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatus"

  /pipeline/phases:
    get:
      operationId: getPipelinePhases
      tags: [pipeline]
      responses:
        "200":
          description: List of phase statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhaseStatus"

  /pipeline/logs:
    get:
      operationId: getPipelineLogs
      tags: [pipeline]
      parameters:
        - name: phase
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

  /pipeline/cost:
    get:
      operationId: getPipelineCost
      tags: [pipeline]
      responses:
        "200":
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostSummary"

  /evaluation/metrics:
    get:
      operationId: getEvaluationMetrics
      tags: [evaluation]
      responses:
        "200":
          description: Evaluation metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenchmarkMetric"

  /evaluation/training-curve:
    get:
      operationId: getTrainingCurve
      tags: [evaluation]
      responses:
        "200":
          description: Training curve data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingPoint"

  /inference/query:
    post:
      operationId: inferenceQuery
      tags: [inference]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"

  /inference/status:
    get:
      operationId: getInferenceStatus
      tags: [inference]
      responses:
        "200":
          description: Inference service status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceServiceStatus"

  /agent/ask:
    post:
      operationId: agentAsk
      tags: [agent]
      summary: Ask the reasoning agent a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRequest"
      responses:
        "200":
          description: Agent reasoning response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"

  /agent/history:
    get:
      operationId: getAgentHistory
      tags: [agent]
      summary: Get recent conversation history
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Conversation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationTurn"

  /agent/history/{sessionId}:
    delete:
      operationId: clearAgentHistory
      tags: [agent]
      summary: Clear a conversation session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearHistoryResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    PipelineStatus:
      type: object
      properties:
        currentPhase:
          type: integer
        overallStatus:
          type: string
          enum: [idle, running, paused, completed, failed]
        startedAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
        totalDatasetSamples:
          type: integer
          nullable: true
        filteredCoTSamples:
          type: integer
          nullable: true
      required: [currentPhase, overallStatus]

    PhaseStatus:
      type: object
      properties:
        phase:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        startedAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        progress:
          type: number
          nullable: true
        errorMessage:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
      required: [phase, name, description, status]

    LogEntry:
      type: object
      properties:
        id:
          type: integer
        phase:
          type: integer
          nullable: true
        level:
          type: string
          enum: [info, warning, error, debug]
        message:
          type: string
        timestamp:
          type: string
        metadata:
          type: object
          nullable: true
          additionalProperties: true
      required: [id, level, message, timestamp]

    CostSummary:
      type: object
      properties:
        totalCostUsd:
          type: number
        totalInputTokens:
          type: integer
        totalOutputTokens:
          type: integer
        requestCount:
          type: integer
        costByPhase:
          type: array
          items:
            $ref: "#/components/schemas/PhaseCost"
        estimatedRemainingUsd:
          type: number
          nullable: true
      required: [totalCostUsd, totalInputTokens, totalOutputTokens, requestCount, costByPhase]

    PhaseCost:
      type: object
      properties:
        phase:
          type: integer
        costUsd:
          type: number
        requestCount:
          type: integer
      required: [phase, costUsd, requestCount]

    BenchmarkMetric:
      type: object
      properties:
        benchmark:
          type: string
        accuracy:
          type: number
        targetAccuracy:
          type: number
        sampleCount:
          type: integer
        evaluatedAt:
          type: string
          nullable: true
        checkpointStep:
          type: integer
          nullable: true
      required: [benchmark, accuracy, targetAccuracy, sampleCount]

    TrainingPoint:
      type: object
      properties:
        step:
          type: integer
        loss:
          type: number
        learningRate:
          type: number
          nullable: true
        timestamp:
          type: string
          nullable: true
      required: [step, loss]

    InferenceRequest:
      type: object
      properties:
        question:
          type: string
        benchmark:
          type: string
          nullable: true
      required: [question]

    InferenceResponse:
      type: object
      properties:
        answer:
          type: string
        latencyMs:
          type: number
        modelLoaded:
          type: boolean
        usedFallback:
          type: boolean
      required: [answer, latencyMs, modelLoaded, usedFallback]

    InferenceServiceStatus:
      type: object
      properties:
        modelLoaded:
          type: boolean
        adapterPath:
          type: string
          nullable: true
        baseModel:
          type: string
          nullable: true
        deviceMap:
          type: string
          nullable: true
        readyForInference:
          type: boolean
      required: [modelLoaded, readyForInference]

    AgentRequest:
      type: object
      properties:
        question:
          type: string
        sessionId:
          type: string
          nullable: true
          description: "Optional session ID for conversation continuity"
        mode:
          type: string
          nullable: true
          enum: [auto, math, commonsense, logic, general]
          description: "Reasoning mode — auto detects from question"
      required: [question]

    ReasoningStep:
      type: object
      properties:
        stepNumber:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [classify, think, calculate, verify, conclude]
      required: [stepNumber, title, content, type]

    AgentResponse:
      type: object
      properties:
        sessionId:
          type: string
        question:
          type: string
        answer:
          type: string
        reasoning:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningStep"
        questionType:
          type: string
          enum: [math, commonsense, logic, general]
        confidence:
          type: string
          enum: [high, medium, low]
        latencyMs:
          type: number
        model:
          type: string
        turnNumber:
          type: integer
      required: [sessionId, question, answer, reasoning, questionType, confidence, latencyMs, model, turnNumber]

    ConversationTurn:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        turnNumber:
          type: integer
        question:
          type: string
        answer:
          type: string
        reasoning:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningStep"
        questionType:
          type: string
        confidence:
          type: string
        latencyMs:
          type: number
        model:
          type: string
        createdAt:
          type: string
      required: [id, sessionId, turnNumber, question, answer, reasoning, questionType, confidence, latencyMs, model, createdAt]

    ClearHistoryResponse:
      type: object
      properties:
        cleared:
          type: boolean
        sessionId:
          type: string
      required: [cleared, sessionId]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
          nullable: true
      required: [error]
